<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FRIDAY Console</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #00f2ff; font-family: 'Courier New', monospace; margin: 0; padding: 10px; overflow-x: hidden; }
        .container { display: flex; flex-direction: column; align-items: center; width: 100%; }
        
        /* Status Card - Compact for Mobile */
        .status-card {
            border: 2px solid #00f2ff; padding: 10px; width: 95%; 
            border-radius: 10px; box-shadow: 0 0 15px #00f2ff; margin-bottom: 20px;
            font-size: 12px; background: rgba(0, 242, 255, 0.05);
        }
        
        /* Button Grid - Responsive */
        .grid {
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 10px; width: 100%; max-width: 400px;
        }
        
        button {
            background: transparent; border: 1px solid #00f2ff; color: #00f2ff;
            padding: 12px 5px; font-size: 10px; border-radius: 5px;
            cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        
        button:active { background: #00f2ff; color: #000; box-shadow: 0 0 20px #00f2ff; }

        /* Logs Output */
        #log-screen {
            width: 95%; height: 80px; background: #050505; border: 1px solid #333;
            margin-top: 20px; padding: 5px; font-size: 10px; color: #0f0; overflow-y: auto;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-card">
            <h3 style="margin:0 0 10px 0; text-align:center;">SYSTEM STATUS</h3>
            <div>• VAULT: <span style="color:#0f0">LOCKED</span></div>
            <div>• GUARDIAN: <span style="color:#0f0">ACTIVE</span></div>
            <div>• UPLINK: -17.5 dBm</div>
        </div>

        <div class="grid">
            <button onclick="sendCmd('PON P1')">PON P1</button>
            <button onclick="sendCmd('PON P2')">PON P2</button>
            <button onclick="sendCmd('PON P3')">PON P3</button>
            <button onclick="sendCmd('PON P4')">PON P4</button>
            <button onclick="sendCmd('HEALTH')">HEALTH</button>
            <button onclick="sendCmd('SPEED')">SPEED</button>
            <button onclick="sendCmd('STATS')">STATS</button>
            <button onclick="sendCmd('ROGUE')">ROGUE</button>
            <button onclick="sendCmd('SEARCH')">SEARCH</button>
            <button onclick="sendCmd('SCAN P1')">SCAN P1</button>
            <button onclick="sendCmd('SCAN P2')">SCAN P2</button>
            <button onclick="sendCmd('CONFIRM')">CONFIRM</button>
            <button onclick="sendCmd('RESCAN')">RESCAN</button>
            <button onclick="sendCmd('ALARM')">ALARM</button>
            <button onclick="sendCmd('EMERGENCY')">EMERGENCY</button>
            <button onclick="sendCmd('MASTER')">MASTER</button>
        </div>

        <div id="log-screen">Ready for commands...</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Full screen setup

        function sendCmd(cmd) {
            document.getElementById('log-screen').innerHTML += "<br>> Executing: " + cmd;
            // Sending data to Python Bot
            tg.sendData(cmd); 
        }
    </script>
</body>
</html>
