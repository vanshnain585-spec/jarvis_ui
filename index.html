<!DOCTYPE html>
<html>
<head>
<title>FRIDAY AI Demo</title>
<style>
body{
background:black;
color:#00eaff;
font-family:Arial;
text-align:center;
padding-top:100px;
}

button{
padding:15px;
font-size:18px;
background:#00eaff;
border:none;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>🤖 FRIDAY AI DEMO</h1>
<p>Say: "Hello Friday"</p>

<button onclick="start()">Start Listening</button>

<p id="output"></p>

<script>

function start(){
const recognition = new webkitSpeechRecognition();
recognition.start();

recognition.onresult = function(event){
let text = event.results[0][0].transcript;
document.getElementById("output").innerHTML =
"You said: " + text;

if(text.toLowerCase().includes("hello friday")){
speak("Hello boss, how can I help you?");
}
}

}

function speak(msg){
let speech = new SpeechSynthesisUtterance();
speech.text = msg;
speechSynthesis.speak(speech);
}

</script>

</body>
</html>
