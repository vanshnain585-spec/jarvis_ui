<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis Console v2</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #050a0f; color: #00f2ff; font-family: 'Courier New', monospace; margin: 0; padding: 15px; overflow-x: hidden; }
        .header { text-align: center; border-bottom: 2px solid #00f2ff; padding-bottom: 10px; margin-bottom: 20px; text-shadow: 0 0 10px #00f2ff; }
        
        /* 16 Button Grid */
        .grid-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .btn { 
            background: rgba(0, 242, 255, 0.1); border: 1px solid #00f2ff; color: #00f2ff;
            padding: 12px 5px; font-size: 10px; text-align: center; border-radius: 5px;
            cursor: pointer; transition: 0.3s; box-shadow: inset 0 0 5px #00f2ff;
        }
        .btn:active { background: #00f2ff; color: #000; transform: scale(0.95); }

        /* Real Data Output Window */
        .terminal { 
            background: rgba(0,0,0,0.8); border: 2px solid #00f2ff; height: 200px; 
            padding: 10px; overflow-y: auto; font-size: 12px; line-height: 1.5;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); border-radius: 5px;
        }
        .line { margin-bottom: 5px; border-left: 3px solid #00f2ff; padding-left: 8px; }
        .system-msg { color: #ffcc00; }
    </style>
</head>
<body>
    <div class="header"><h1>JARVIS OS v2.0</h1></div>

    <div class="grid-container">
        <div class="btn" onclick="sendCommand('PON Port 1')">🔌 PON 1</div>
        <div class="btn" onclick="sendCommand('PON Port 2')">🔌 PON 2</div>
        <div class="btn" onclick="sendCommand('PON Port 3')">🔌 PON 3</div>
        <div class="btn" onclick="sendCommand('PON Port 4')">🔌 PON 4</div>
        <div class="btn" onclick="sendCommand('🛡️ Rogue')">🛡️ ROGUE</div>
        <div class="btn" onclick="sendCommand('📈 Health')">📈 HEALTH</div>
        <div class="btn" onclick="sendCommand('🚀 Speed')">🚀 SPEED</div>
        <div class="btn" onclick="sendCommand('📡 OLT STATUS')">📡 STATUS</div>
        <div class="btn" onclick="sendCommand('📸 Photo')">📸 PHOTO</div>
        <div class="btn" onclick="sendCommand('👥 On/Off')">👥 USERS</div>
        <div class="btn" onclick="sendCommand('🛠️ Mon ON')">🛠️ MONITOR</div>
        <div class="btn" onclick="sendCommand('🔍 Search')">🔍 SEARCH</div>
        <div class="btn" onclick="sendCommand('⚡ Stats')">⚡ STATS</div>
        <div class="btn" onclick="sendCommand('🛠️ Ticket')">🛠️ TICKET</div>
        <div class="btn" onclick="sendCommand('📖 Guide')">📖 GUIDE</div>
        <div class="btn" style="border-color: #ff4444;" onclick="Telegram.WebApp.close()">❌ CLOSE</div>
    </div>

    <div class="terminal" id="output">
        <div class="line system-msg">> SYSTEM READY... WAITING FOR COMMAND</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function sendCommand(cmd) {
            const out = document.getElementById('output');
            out.innerHTML += `<div class="line">> Executing: ${cmd}...</div>`;
            out.scrollTop = out.scrollHeight;
            
            // Bot ko signal bhejna
            tg.sendData(cmd); 
        }

        // Future update: Bot se data receive karne ke liye
        tg.onEvent('mainButtonClicked', function(){
            // Logic for real-time sync
        });
    </script>
</body>
</html>
